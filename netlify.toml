# Netlify settings for Multi-Page App
[build]
  command = "echo Static frontend only"
  publish = "frontend"

[[redirects]]
  from = "/"
  to = "/pages/index.html"
  status = 301
  force = true

# Remove the catch-all "/*" redirect that was causing reloads.
# Netlify will now correctly serve files from the /pages/ folder.
